services:
  db:
    container_name: postgres-db
    image: postgres:latest
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5432:5432"
    networks:
      - db
    restart: unless-stopped

volumes:
  db:

networks:
  # The presence of these objects is sufficient to define them
  db:
    driver: bridge